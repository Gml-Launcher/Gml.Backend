name: ReGml Manager Tests

on:
  workflow_dispatch:
    inputs:
      install_version:
        description: Docker image tag to install
        required: true
        default: v2025.3.2
        type: string
      update_version:
        description: Docker image tag to update to
        required: true
        default: v2025.3.1
        type: string
  push:
    branches:
      - master
    paths:
      - "installer/regml-manager.sh"
      - "docker-compose-prod.yml"
      - ".github/workflows/regml-manager-tests.yml"

permissions:
  contents: read

concurrency:
  group: regml-manager-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  install-update-delete:
    name: ${{ matrix.distro }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-26.04
            runner: ubuntu-26.04
          - distro: ubuntu-24.04
            runner: ubuntu-24.04
          - distro: ubuntu-22.04
            runner: ubuntu-22.04

    env:
      INSTALL_DIR: /tmp/regml-manager-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.distro }}
      INSTALL_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.install_version || 'v2025.3.2' }}
      UPDATE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.update_version || 'v2025.3.1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print VM info
        run: |
          set -eux
          id
          uname -a
          cat /etc/os-release
          command -v sudo

      - name: Clean previous CI install directory
        run: |
          set -eux
          sudo rm -rf "$INSTALL_DIR" "$INSTALL_DIR"_backup_*

      - name: Install ReGml Manager stack
        run: |
          set -eux
          sudo sh ./installer/regml-manager.sh install --version "$INSTALL_VERSION" --dir "$INSTALL_DIR"

      - name: Validate installation files
        run: |
          set -eux
          sudo test -f "$INSTALL_DIR/.env"
          sudo test -f "$INSTALL_DIR/docker-compose.yml"
          sudo grep -qx "GML_VERSION=$INSTALL_VERSION" "$INSTALL_DIR/.env"

      - name: Validate Docker Compose state
        run: |
          set -eux
          sudo env INSTALL_DIR="$INSTALL_DIR" sh -c '
            cd "$INSTALL_DIR"
            for attempt in $(seq 1 60); do
              exited_services="$(docker compose ps --services --status exited)"
              if [ -n "$exited_services" ]; then
                echo "Exited services detected:"
                echo "$exited_services"
                docker compose ps
                exit 1
              fi

              total_services="$(docker compose ps --services | wc -l)"
              running_services="$(docker compose ps --services --status running | wc -l)"
              if [ "$total_services" -gt 0 ] && [ "$running_services" -eq "$total_services" ]; then
                docker compose ps
                exit 0
              fi

              docker compose ps
              sleep 5
            done

            echo "Timed out waiting for all services to run"
            docker compose ps
            exit 1
          '

      - name: Update ReGml Manager stack
        run: |
          set -eux
          sudo sh ./installer/regml-manager.sh update --version "$UPDATE_VERSION" --dir "$INSTALL_DIR"
          sudo grep -qx "GML_VERSION=$UPDATE_VERSION" "$INSTALL_DIR/.env"

      - name: Validate updated Docker Compose state
        run: |
          set -eux
          sudo env INSTALL_DIR="$INSTALL_DIR" sh -c '
            cd "$INSTALL_DIR"
            for attempt in $(seq 1 60); do
              exited_services="$(docker compose ps --services --status exited)"
              if [ -n "$exited_services" ]; then
                echo "Exited services detected after update:"
                echo "$exited_services"
                docker compose ps
                exit 1
              fi

              total_services="$(docker compose ps --services | wc -l)"
              running_services="$(docker compose ps --services --status running | wc -l)"
              if [ "$total_services" -gt 0 ] && [ "$running_services" -eq "$total_services" ]; then
                docker compose ps
                exit 0
              fi

              docker compose ps
              sleep 5
            done

            echo "Timed out waiting for all services to run after update"
            docker compose ps
            exit 1
          '

      - name: Delete ReGml Manager stack
        run: |
          set -eux
          sudo sh ./installer/regml-manager.sh delete --dir "$INSTALL_DIR"
          sudo test ! -d "$INSTALL_DIR"
          backup_name="$(basename "$INSTALL_DIR")_backup_*"
          backup_dir="$(sudo find /tmp -maxdepth 1 -type d -name "$backup_name" | head -n 1)"
          test -n "$backup_dir"
          echo "Backup directory: $backup_dir"

      - name: Show diagnostics
        if: always()
        run: |
          set +e
          sudo docker ps -a
          sudo find /tmp -maxdepth 1 -type d -name "regml-manager-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.distro }}*" -print

      - name: Cleanup
        if: always()
        run: |
          set +e
          sudo rm -rf "$INSTALL_DIR" "$INSTALL_DIR"_backup_*
